<head>
<meta charset="UTF-8">
<title>Tarot IA</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;

}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#mesa{
margin-top:20px;
}

.carta{
width:120px;
margin:5px;
cursor:pointer;
transition:transform .2s;
}

.carta:hover{
transform:scale(1.1);
}

#resultado{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>Tarot IA</h1>

<button onclick="idioma='ES'">Español</button>
<button onclick="idioma='EN'">English</button>
<button onclick="barajar()">Barajar</button>
<button onclick="interpretar()">Interpretar</button>

<div id="mesa"></div>

<div id="resultado"></div>

<script>

function barajar(){

seleccion=[]
mazo=[]

for(let i=1;i<=78;i++) mazo.push(i)

mazo.sort(()=>Math.random()-0.5)

const mesa=document.getElementById("mesa")
mesa.innerHTML=""

mazo.slice(0,12).forEach(c=>{

let img=document.createElement("img")

img.src="img/"+c+".jpg"
img.className="carta"

img.onclick=()=>elegir(c)

mesa.appendChild(img)

})

}

function elegir(c){

if(seleccion.length>=3) return

if(!seleccion.includes(c)){
seleccion.push(c)
}

mostrar()

}

function mostrar(){

const r=document.getElementById("resultado")

let nombres=seleccion.map(c=>
idioma=="ES"?cartasES[c]:cartasEN[c]
)

r.innerHTML=nombres.join("<br>")

}

function interpretar(){

if(seleccion.length!==3){
alert(idioma=="ES"?"Selecciona 3 cartas":"Select 3 cards")
return
}

let nombres=seleccion.map(c=>
idioma=="ES"?cartasES[c]:cartasEN[c]
)

let texto=idioma=="ES"
?`Interpreta lectura tarot resumen directo de la pregunta y consejo: ${nombres.join(", ")}`
:`Interpret tarot reading direct summary and advice: ${nombres.join(", ")}`

window.open("https://chat.openai.com/?prompt="+encodeURIComponent(texto),"_blank")

}

</script>
