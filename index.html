<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERA Tarot 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

body{

margin:0;
font-family:'Cinzel',serif;

background-image:url("gitana_tarot.jpg");
background-position:center;
background-size:cover;
background-repeat:no-repeat;
background-attachment:fixed;

color:#FFD700;
text-align:center;

min-height:100vh;

display:flex;
justify-content:center;

}

.contenedor{

width:95%;
max-width:1200px;

margin:auto;
padding:20px;

background:rgba(0,0,0,0.65);

border-radius:20px;

box-shadow:
0 0 40px rgba(0,0,0,.8),
0 0 20px rgba(255,215,0,.3);

}

h1{

font-size:48px;
text-shadow:0 0 20px gold;

}

input,select{

padding:10px;
font-size:18px;

background:black;
color:gold;

border:2px solid gold;
margin:5px;

font-family:'Cinzel';

}

.botonera{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;

margin-top:15px;

}

.btnTarot{

padding:12px 24px;
font-size:16px;

background:linear-gradient(145deg,#111,#000);
color:#FFD700;

border:2px solid #FFD700;
border-radius:30px;

cursor:pointer;

box-shadow:
0 0 10px rgba(255,215,0,.4),
inset 0 0 10px rgba(255,215,0,.2);

transition:all .3s ease;

letter-spacing:1px;

}

.btnTarot:hover{

transform:translateY(-3px) scale(1.05);

background:linear-gradient(145deg,#000,#222);

box-shadow:
0 0 20px rgba(255,215,0,.9),
0 0 40px rgba(255,215,0,.6);

}

.btnTarot:active{

transform:scale(.95);

}

#cartas{

display:grid;
justify-content:center;
gap:20px;
margin-top:30px;

}

.grid3{grid-template-columns:repeat(3,150px);}
.grid5{grid-template-columns:repeat(5,150px);}
.grid10{grid-template-columns:repeat(5,150px);}
.grid78{grid-template-columns:repeat(7,100px);}

.carta{

width:140px;
height:240px;
position:relative;

}

.carta img{

width:100%;
height:200px;
border-radius:20px;

}

.sombraCarta{

position:absolute;

top:0;
left:0;

width:100%;
height:200px;

background:black;

border-radius:20px;

animation:revelarCarta 1s forwards;
animation-delay:5s;

}

.nombreCarta{

font-size:14px;
margin-top:5px;

color:#FFD700;
font-weight:700;

display:none;

}

#resultado{

margin:30px auto;

width:80%;
max-width:900px;

background:#1a1a1a;

color:white;

padding:20px;

border-radius:12px;

white-space:pre-line;
font-size:18px;

}

#instrucciones{

width:90%;
max-width:900px;

margin:40px auto;

background:rgba(0,0,0,0.8);

border:2px solid gold;

border-radius:12px;

color:white;

padding:15px;

text-align:left;
font-size:14px;

line-height:1.4;

}

.carta::after{

content:"";

position:absolute;

top:-10px;
left:-10px;

width:160%;
height:220px;

background:radial-gradient(circle,rgba(255,215,0,.9),rgba(255,215,0,.3),transparent 70%);

animation:rayosMagicos .4s infinite alternate;

pointer-events:none;

}

@keyframes rayosMagicos{

0%{opacity:.2;filter:blur(2px);}
100%{opacity:.9;filter:blur(6px);}

}

@keyframes torbellinoMagico{

0%{transform:translateX(-600px) rotate(0) scale(.2);opacity:0}
25%{transform:translateX(-200px) rotate(720deg) scale(.5);opacity:.5}
50%{transform:translateX(200px) rotate(1440deg) scale(.8);opacity:.8}
100%{transform:translateX(0) rotate(3600deg) scale(1);opacity:1}

}

@keyframes revelarCarta{

0%{opacity:1;}
100%{opacity:0;}

}

/* MOBILE */

@media (max-width:900px){

.grid3{grid-template-columns:repeat(3,110px);}
.grid5{grid-template-columns:repeat(3,110px);}
.grid10{grid-template-columns:repeat(4,100px);}
.grid78{grid-template-columns:repeat(5,80px);}

.carta{

width:100px;
height:180px;

}

.carta img{

height:150px;

}

}

</style>

</head>

<body>

<div class="contenedor">

<h1>NERA Tarot</h1>

<input id="pregunta" placeholder="Escribe tu pregunta">

<br>

<select id="tirada">
<option value="3">3 Cartas</option>
<option value="5">5 Cartas</option>
<option value="10">10 Cartas</option>
<option value="78">78 Cartas</option>
</select>

<div class="botonera">

<button class="btnTarot" onclick="tirar()">Tirar Cartas</button>
<button class="btnTarot" onclick="interpretar()">Interpretar</button>
<button class="btnTarot" onclick="resetear()">Resetear Lectura</button>
<button class="btnTarot" onclick="traducir()">Español / English</button>

</div>

<div id="cartas"></div>

<div id="resultado"></div>

<button class="btnTarot" onclick="copiarResultado()">Copiar Resultado</button>

<div id="instrucciones"></div>

</div>

<script>

let idioma="ES";
let tiradaActual=[];

/* TAROT */

function tirar(){

let n=parseInt(document.getElementById("tirada").value);

let deck=[...Array(78).keys()].map(x=>x+1);

tiradaActual=[];

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*deck.length);

tiradaActual.push(deck[r]);

deck.splice(r,1);

}

mostrar();

}

function mostrar(){

let cont=document.getElementById("cartas");

cont.innerHTML="";

tiradaActual.forEach(c=>{

let div=document.createElement("div");
div.className="carta";

let img=document.createElement("img");
img.src=c+".jpg";

let sombra=document.createElement("div");
sombra.className="sombraCarta";

let nombre=document.createElement("div");
nombre.className="nombreCarta";

nombre.innerText="Carta "+c;

div.appendChild(img);
div.appendChild(sombra);
div.appendChild(nombre);

cont.appendChild(div);

div.style.animation="torbellinoMagico 5s forwards";

setTimeout(()=>{nombre.style.display="block";},5000);

});

}

function interpretar(){

let pregunta=document.getElementById("pregunta").value;

document.getElementById("resultado").innerText=

"Interpreta lectura resumen directo de la pregunta y consejo\n"+
pregunta+"\n"+
tiradaActual.join(",");

}

function copiarResultado(){

navigator.clipboard.writeText(
document.getElementById("resultado").innerText
);

alert("Resultado copiado");

}

function resetear(){

tiradaActual=[];
document.getElementById("cartas").innerHTML="";
document.getElementById("resultado").innerHTML="";

}

function traducir(){

alert("Modo bilingüe activo");

}

</script>

</body>
</html>
