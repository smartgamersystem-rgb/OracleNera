<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NERA Tarot</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:gold;
margin-bottom:20px;
}

input{
width:80%;
max-width:500px;
padding:10px;
font-size:16px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
background:gold;
border:none;
border-radius:6px;
}

#cartas{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.carta{
width:120px;
height:180px;
background:linear-gradient(145deg,#111,#000);
border:2px solid gold;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-size:14px;
box-shadow:0 0 15px gold;
opacity:0;
transform:scale(0.5) rotateY(180deg);
transition:all 1s;
}

.carta.mostrar{
opacity:1;
transform:scale(1) rotateY(0deg);
}

#resultado{
margin-top:20px;
padding:15px;
border:2px solid gold;
max-width:600px;
margin-left:auto;
margin-right:auto;
white-space:pre-line;
}

#instrucciones{
width:90%;
max-width:700px;
margin:40px auto;
background:rgba(0,0,0,0.8);
border:2px solid gold;
border-radius:10px;
padding:15px;
font-size:14px;
text-align:left;
}

</style>
</head>

<body>

<h1>NERA Tarot</h1>

<input id="pregunta" placeholder="Escribe tu pregunta">

<br>

<button onclick="tirarCartas()">Tirar Cartas</button>
<button onclick="copiarResultado()">Copiar Resultado</button>

<div id="cartas">
<div class="carta" id="carta1"></div>
<div class="carta" id="carta2"></div>
<div class="carta" id="carta3"></div>
</div>

<div id="resultado"></div>

<div id="instrucciones">

<b>Instrucciones</b><br><br>

1. Escribe tu pregunta.<br>
2. Presiona "Tirar Cartas".<br>
3. Se generarán tres cartas del tarot.<br>
4. Copia el resultado.<br>
5. Pega el resultado en ChatGPT para interpretar la lectura.<br><br>

Cada tirada es aleatoria y única.

</div>

<script>

const cartas = [

"El Loco",
"El Mago",
"La Sacerdotisa",
"La Emperatriz",
"El Emperador",
"El Hierofante",
"Los Enamorados",
"El Carro",
"La Justicia",
"El Ermitaño",
"La Rueda de la Fortuna",
"La Fuerza",
"El Colgado",
"La Muerte",
"La Templanza",
"El Diablo",
"La Torre",
"La Estrella",
"La Luna",
"El Sol",
"El Juicio",
"El Mundo"

];

function tirarCartas(){

let seleccionadas=[];

while(seleccionadas.length<3){

let r=Math.floor(Math.random()*cartas.length);

if(!seleccionadas.includes(r)){
seleccionadas.push(r);
}

}

let c1=cartas[seleccionadas[0]];
let c2=cartas[seleccionadas[1]];
let c3=cartas[seleccionadas[2]];

document.getElementById("carta1").innerText=c1;
document.getElementById("carta2").innerText=c2;
document.getElementById("carta3").innerText=c3;

setTimeout(()=>{document.getElementById("carta1").classList.add("mostrar");},200);
setTimeout(()=>{document.getElementById("carta2").classList.add("mostrar");},700);
setTimeout(()=>{document.getElementById("carta3").classList.add("mostrar");},1200);

let pregunta=document.getElementById("pregunta").value;

let resultado=
"Pregunta: "+pregunta+

"\n\nCartas:\n"+
"1. "+c1+"\n"+
"2. "+c2+"\n"+
"3. "+c3+

"\n\nInterpreta la lectura con un resumen directo y consejo.";

document.getElementById("resultado").innerText=resultado;

}

function copiarResultado(){

let texto=document.getElementById("resultado").innerText;

navigator.clipboard.writeText(texto);

alert("Resultado copiado");

}

</script>

</body>
</html>
