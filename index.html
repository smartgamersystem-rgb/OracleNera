<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarot</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#mesa{
margin-top:20px;
}

.carta{
width:120px;
margin:5px;
cursor:pointer;
}

#resultado{
margin-top:20px;
font-size:22px;
}
</style>

</head>
<body>

<h1>Tarot</h1>

<button onclick="barajar()">Barajar</button>
<button onclick="interpretar()">Interpretar</button>

<div id="mesa"></div>
<div id="resultado"></div>

<script>

let mazo=[]
let seleccion=[]

const cartasES={
1:"El Loco",2:"El Mago",3:"La Sacerdotisa",4:"La Emperatriz",5:"El Emperador",6:"El Hierofante",
7:"Los Enamorados",8:"El Carro",9:"La Fuerza",10:"El Ermitaño",11:"La Rueda de la Fortuna",
12:"La Justicia",13:"El Colgado",14:"La Muerte",15:"La Templanza",16:"El Diablo",17:"La Torre",
18:"La Estrella",19:"La Luna",20:"El Sol",21:"El Juicio",22:"El Mundo",

23:"As de Bastos",24:"Dos de Bastos",25:"Tres de Bastos",26:"Cuatro de Bastos",27:"Cinco de Bastos",
28:"Seis de Bastos",29:"Siete de Bastos",30:"Ocho de Bastos",31:"Nueve de Bastos",32:"Diez de Bastos",
33:"Sota de Bastos",34:"Caballero de Bastos",35:"Reina de Bastos",36:"Rey de Bastos",

37:"As de Copas",38:"Dos de Copas",39:"Tres de Copas",40:"Cuatro de Copas",41:"Cinco de Copas",
42:"Seis de Copas",43:"Siete de Copas",44:"Ocho de Copas",45:"Nueve de Copas",46:"Diez de Copas",
47:"Sota de Copas",48:"Caballero de Copas",49:"Reina de Copas",50:"Rey de Copas",

51:"As de Espadas",52:"Dos de Espadas",53:"Tres de Espadas",54:"Cuatro de Espadas",55:"Cinco de Espadas",
56:"Seis de Espadas",57:"Siete de Espadas",58:"Ocho de Espadas",59:"Nueve de Espadas",60:"Diez de Espadas",
61:"Sota de Espadas",62:"Caballero de Espadas",63:"Reina de Espadas",64:"Rey de Espadas",

65:"As de Oros",66:"Dos de Oros",67:"Tres de Oros",68:"Cuatro de Oros",69:"Cinco de Oros",
70:"Seis de Oros",71:"Siete de Oros",72:"Ocho de Oros",73:"Nueve de Oros",74:"Diez de Oros",
75:"Sota de Oros",76:"Caballero de Oros",77:"Reina de Oros",78:"Rey de Oros"
}

function barajar(){

mazo=[]
seleccion=[]

for(let i=1;i<=78;i++) mazo.push(i)

mazo.sort(()=>Math.random()-0.5)

const mesa=document.getElementById("mesa")
mesa.innerHTML=""

mazo.slice(0,12).forEach(c=>{

let img=document.createElement("img")
img.src="img/"+c+".jpg"
img.className="carta"

img.onclick=()=>elegir(c)

mesa.appendChild(img)

})

document.getElementById("resultado").innerHTML=""

}

function elegir(c){

if(seleccion.length>=3) return

if(!seleccion.includes(c)){
seleccion.push(c)
}

mostrar()

}

function mostrar(){

let nombres = seleccion.map(c=>cartasES[c])

document.getElementById("resultado").innerHTML =
nombres.join("<br>")

}

function interpretar(){

if(seleccion.length!=3){
alert("Selecciona 3 cartas")
return
}

let nombres = seleccion.map(c=>cartasES[c])

let texto =
"Interpreta lectura resumen directo de la pregunta y consejo: "
+ nombres.join(", ")

window.open(
"https://chat.openai.com/?prompt="+encodeURIComponent(texto),
"_blank"
)

}

</script>

</body>
</html>
